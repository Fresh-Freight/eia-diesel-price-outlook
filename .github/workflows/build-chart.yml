name: Build and deploy EIA diesel outlook

on:
  push:
    branches: [main]
  schedule:
    # Every Wednesday at 18:00 UTC (~11am AZ).
    # EIA refreshes weekly retail diesel on Mondays, STEO mid-month.
    - cron: "0 18 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Inject EIA API key into index.html
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python scripts/inject_key.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
